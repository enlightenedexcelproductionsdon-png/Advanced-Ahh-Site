<!-- Slider modal template used by sliders.js -->
<div class="modal-content">
  <header>
    <h3 id="modalTitle">Parameters</h3>
    <button id="closeModalBtn">Close</button>
  </header>
  <div id="modalBody">
    <!-- Sliders will be injected here -->
  </div>
  <div class="footer">
    <div id="modalNote" style="color:var(--muted)">Adjust parameters to tweak the effect.</div>
    <div>
      <button id="applyParamsBtn">Apply</button>
    </div>
  </div>
</div>
